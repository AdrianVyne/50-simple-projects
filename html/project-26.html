<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="../css/back-home.css" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" />
    <link rel="stylesheet" href="../css/style26.css" />
    <title>Vertical Slider</title>
</head>

<body>
  <a class="home-fab" href="../index.html" aria-label="Back to all projects"><svg class="home-fab__icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg><span>All Projects</span></a>
    <div class="slider-container">
        <div class="left-slide">
            <div style="background-color: #0f9b8e">
                <h1>Coastal calm</h1>
                <p>where waves meet sand</p>
            </div>
            <div style="background-color: #e0a458">
                <h1>Desert gold</h1>
                <p>across endless dunes</p>
            </div>
            <div style="background-color: #2b2d42">
                <h1>Urban pulse</h1>
                <p>the city after dark</p>
            </div>
            <div style="background-color: #1b4332">
                <h1>Forest deep</h1>
                <p>into the green</p>
            </div>
        </div>
        <div class="right-slide">
            <div
                style="background-image: url('https://picsum.photos/seed/vslide-coast/1350/1900')">
            </div>
            <div
                style="background-image: url('https://picsum.photos/seed/vslide-desert/1350/1900')">
            </div>
            <div
                style="background-image: url('https://picsum.photos/seed/vslide-city/1350/1900')">
            </div>
            <div
                style="background-image: url('https://picsum.photos/seed/vslide-forest/1350/1900')">
            </div>
        </div>
        <div class="action-buttons">
            <button class="down-button">
                <i class="fas fa-arrow-down"></i>
            </button>
            <button class="up-button">
                <i class="fas fa-arrow-up"></i>
            </button>
        </div>
    </div>

    <script src="../js/script26.js"></script>
</body>

</html>
