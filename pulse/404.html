<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PULSE — lost in space</title>
  <link rel="stylesheet" href="pulse.css" />
  <link rel="icon" type="image/x-icon" href="../imgs/favicon.png" />
</head>

<body class="p-404-body">
  <!-- Hoverboard background (36) -->
  <div class="p-hoverboard" data-project="36" data-name="Hoverboard"></div>

  <main class="p-404">
    <p class="p-eyebrow">Error 404</p>
    <h1 class="p-404__title">You wandered off the grid</h1>
    <p class="p-404__sub">This page doesn't exist — but the bugs do. Squash a few while you're here.</p>

    <!-- Dad joke (9) -->
    <div class="p-card p-joke" data-project="9" data-name="Dad Jokes">
      <p class="p-joke__text" id="p-joke">Loading a terrible joke…</p>
      <button class="p-btn p-btn--ghost" id="p-joke-btn">Another one →</button>
    </div>

    <div class="p-404__cta">
      <a class="p-btn" href="index.html">Back to PULSE</a>
      <a class="p-btn p-btn--ghost" href="../index.html">The 50 projects</a>
    </div>
  </main>

  <!-- Catch the insect (50) -->
  <div class="p-buggame" data-project="50" data-name="Catch The Insect">
    <div class="p-buggame__hud">
      <span>Time: <b id="p-bug-time">0</b>s</span>
      <span>Squashed: <b id="p-bug-score">0</b></span>
      <button class="p-btn p-bug-start">Start the swarm</button>
    </div>
  </div>

  <script src="pulse.js"></script>
  <script src="pulse-404.js"></script>
</body>

</html>
